<!DOCTYPE html>
<html lang="ar" dir="rtl" data-title-key="poemForm">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نموذج القصيدة - ديوان الصوفية</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/design.css">
</head>
<body>
  <div class="page-content">
    <!-- Top Navigation -->
    <nav class="nav-top">
      <div class="nav-actions">
        <button id="backBtn" class="btn btn-icon">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
      </div>
      <h1 id="pageTitle" class="nav-title" data-i18n="addPoem">إضافة قصيدة</h1>
      <div class="nav-actions">
        <!-- Space for future actions -->
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="container" style="max-width: 800px;">
        <form id="poemForm" class="glass-panel">
          <!-- Title -->
          <div class="form-group">
            <label class="form-label" data-i18n="title">العنوان</label>
            <input 
              type="text" 
              id="titleInput" 
              name="title"
              class="form-control" 
              required 
              data-i18n-placeholder="title"
              placeholder="عنوان القصيدة"
            >
          </div>

          <!-- Poet -->
          <div class="form-group">
            <label class="form-label" data-i18n="poet">الشاعر</label>
            <select id="poetSelect" name="poetId" class="form-control" required>
              <option value="">اختر الشاعر...</option>
            </select>
          </div>

          <!-- Maqam -->
          <div class="form-group">
            <label class="form-label" data-i18n="maqam">المقام</label>
            <select id="maqamSelect" name="maqamId" class="form-control" required>
              <option value="">اختر المقام...</option>
            </select>
          </div>

          <!-- Category -->
          <div class="form-group">
            <label class="form-label" data-i18n="category">التصنيف</label>
            <select id="categorySelect" name="category" class="form-control" required>
              <option value="">اختر التصنيف...</option>
              <option value="Ilahiyyat" data-i18n="Ilahiyyat">إلهيات</option>
              <option value="Nabawiyyat" data-i18n="Nabawiyyat">نبويات</option>
              <option value="Mufrad" data-i18n="Mufrad">مفرد</option>
              <option value="Hadra" data-i18n="Hadra">حضرة</option>
            </select>
          </div>

          <!-- Hadra Section (only shown when category is Hadra) -->
          <div id="hadraSectionGroup" class="form-group" style="display: none;">
            <label class="form-label" data-i18n="hadraSection">قسم الحضرة</label>
            <select id="hadraSectionSelect" name="hadraSection" class="form-control">
              <option value="">اختر قسم الحضرة...</option>
              <option value="Matali" data-i18n="Matali">مطالع</option>
              <option value="Ruku" data-i18n="Ruku">ركوع</option>
              <option value="Qiyam" data-i18n="Qiyam">قيام</option>
            </select>
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label class="form-label" data-i18n="notes">ملاحظات</label>
            <input 
              type="text" 
              id="notesInput" 
              name="notes"
              class="form-control" 
              data-i18n-placeholder="notes"
              placeholder="ملاحظات اختيارية"
            >
          </div>

          <!-- Poem Body -->
          <div class="form-group">
            <label class="form-label" data-i18n="poemBody">نص القصيدة</label>
            <textarea 
              id="bodyInput" 
              name="body"
              class="form-control font-arabic" 
              rows="15" 
              required 
              data-i18n-placeholder="poemBody"
              placeholder="اكتب نص القصيدة هنا..."
              style="font-size: 1.25rem; line-height: 2;"
            ></textarea>
          </div>

          <!-- Submit Button -->
          <div class="action-buttons">
            <button type="submit" id="submitBtn" class="btn btn-primary btn-lg btn-block">
              <span class="material-symbols-outlined">save</span>
              <span data-i18n="savePoem">حفظ القصيدة</span>
            </button>
          </div>
        </form>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <div id="nav"></div>
  </div>

  <script type="module" src="/js/pages/poem-form.js"></script>
</body>
</html>
