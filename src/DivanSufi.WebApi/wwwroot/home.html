<!DOCTYPE html>
<html lang="ar" dir="rtl" data-title-key="appName">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ديوان الصوفية</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/design.css">
</head>
<body>
  <div class="page-content">
    <!-- Top Navigation -->
    <nav class="nav-top">
      <h1 id="appTitle" class="nav-title" data-i18n="appName">ديوان الصوفية</h1>
      <div class="nav-actions">
        <button id="langToggle" class="btn btn-secondary btn-sm" data-i18n="langToggle">English</button>
        <button id="logoutBtn" class="btn btn-danger btn-sm">
          <span class="material-symbols-outlined">logout</span>
          <span data-i18n="logout">خروج</span>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Welcome Section -->
      <div class="glass-panel" style="text-align: center; margin-bottom: 2rem;">
        <h2 id="userGreeting" style="color: var(--gold); margin-bottom: 1rem;">أهلاً</h2>
        <p class="text-muted" style="font-size: 1.125rem;">مرحباً بك في ديوان الصوفية</p>
      </div>

      <!-- Quick Search -->
      <div class="glass-panel" style="margin-bottom: 2rem;">
        <h3 data-i18n="quickSearch" style="margin-bottom: 1rem;">بحث سريع</h3>
        <form id="quickSearchForm" class="search-bar">
          <input 
            type="text" 
            id="quickSearch" 
            class="form-control" 
            data-i18n-placeholder="search"
            placeholder="بحث في القصائد..."
          >
          <span class="search-icon material-symbols-outlined">search</span>
        </form>
      </div>

      <!-- Main Actions -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6" style="margin-bottom: 2rem;">
        <!-- Current Poem -->
        <div id="currentPoemCard" class="card card-clickable" style="text-align: center; padding: 2rem;">
          <span class="material-symbols-outlined" style="font-size: 4rem; color: var(--primary-light); margin-bottom: 1rem;">record_voice_over</span>
          <h3 data-i18n="currentPoem" class="card-title">القصيدة الحالية</h3>
          <p class="text-muted">اضغط للاستماع للقصيدة المشاركة حالياً</p>
        </div>

        <!-- Current Wasla -->
        <div id="currentWaslaCard" class="card card-clickable" style="text-align: center; padding: 2rem;">
          <span class="material-symbols-outlined" style="font-size: 4rem; color: var(--primary-light); margin-bottom: 1rem;">playlist_play</span>
          <h3 data-i18n="currentWasla" class="card-title">الوصلة الحالية</h3>
          <p class="text-muted">اضغط لمشاهدة الوصلة المشاركة حالياً</p>
        </div>

        <!-- Catalog -->
        <div id="catalogCard" class="card card-clickable" style="text-align: center; padding: 2rem;">
          <span class="material-symbols-outlined" style="font-size: 4rem; color: var(--primary-light); margin-bottom: 1rem;">menu_book</span>
          <h3 data-i18n="catalog" class="card-title">فهرس الديوان</h3>
          <p class="text-muted">تصفح جميع القصائد والوصلات</p>
        </div>
      </div>

      <!-- Featured Poem -->
      <div style="margin-bottom: 2rem;">
        <h3 data-i18n="featuredPoem" style="margin-bottom: 1rem;">قصيدة مميزة</h3>
        <div id="featuredPoem"></div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <div id="nav"></div>
  </div>

  <script type="module" src="/js/pages/home.js"></script>
</body>
</html>
