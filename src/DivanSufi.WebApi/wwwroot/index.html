<!DOCTYPE html>
<html lang="ar" dir="rtl" data-title-key="login">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول - ديوان الصوفية</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/design.css">
  
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .login-box {
      max-width: 400px;
      width: 100%;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    .app-logo {
      font-size: 3rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    
    .app-subtitle {
      color: var(--text-muted);
      font-size: 1.125rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <div class="app-logo font-arabic">ديوان الصوفية</div>
        <div class="app-subtitle">Divan Al-Sufiyya</div>
      </div>
      
      <div class="glass-panel">
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" data-i18n="username">اسم المستخدم</label>
            <input 
              type="text" 
              id="username" 
              class="form-control" 
              required 
              autocomplete="username"
              data-i18n-placeholder="username"
              placeholder="اسم المستخدم"
            >
          </div>
          
          <div class="form-group">
            <label class="form-label" data-i18n="password">كلمة المرور</label>
            <input 
              type="password" 
              id="password" 
              class="form-control" 
              required 
              autocomplete="current-password"
              data-i18n-placeholder="password"
              placeholder="كلمة المرور"
            >
          </div>
          
          <button type="submit" id="submitBtn" class="btn btn-primary btn-block btn-lg">
            <span data-i18n="login">دخول</span>
          </button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center;">
          <div class="text-sm text-muted">
            المستخدمون الافتراضيون:
          </div>
          <div class="text-sm text-muted" style="margin-top: 0.5rem;">
            <strong>lead</strong> / lead123 (منشد رئيسي)<br>
            <strong>ahmad</strong> / ahmad123 (منشد)<br>
            <strong>mohammed</strong> / mohammed123 (منشد)
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
