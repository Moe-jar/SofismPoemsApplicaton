<!DOCTYPE html>
<html lang="ar" dir="rtl" data-title-key="waslat">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الوصلات - ديوان الصوفية</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/design.css">
</head>
<body>
  <div class="page-content">
    <!-- Top Navigation -->
    <nav class="nav-top">
      <div class="nav-actions">
        <button id="backBtn" class="btn btn-icon">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
      </div>
      <h1 class="nav-title" data-i18n="waslat">الوصلات</h1>
      <div class="nav-actions">
        <button id="newWaslaBtn" class="btn btn-primary btn-sm" style="display: none;">
          <span class="material-symbols-outlined">add</span>
          <span data-i18n="newWasla">وصلة جديدة</span>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Search Bar -->
      <div class="search-bar">
        <input 
          type="text" 
          id="searchInput" 
          class="form-control" 
          data-i18n-placeholder="search"
          placeholder="بحث في الوصلات..."
        >
        <span class="search-icon material-symbols-outlined">search</span>
      </div>

      <!-- Results Count -->
      <div id="resultsCount" class="text-sm text-muted" style="margin-bottom: 1rem;"></div>

      <!-- Waslat Grid -->
      <div id="waslatGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Waslat will be loaded here -->
      </div>
    </main>

    <!-- Bottom Navigation -->
    <div id="nav"></div>
  </div>

  <script type="module" src="/js/pages/waslat.js"></script>
</body>
</html>
