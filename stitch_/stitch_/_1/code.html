            background: rgba(255, 255, 255, 0.02);

        textarea::-webkit-scrollbar-thumb {

        }

            background: rgba(33, 131, 98, 0.6);

            border: 1px solid rgba(255, 255, 255, 0.08);

        @keyframes float {

<body class="bg-background-dark text-white font-display overflow-x-hidden min-h-screen relative selection:bg-primary selection:text-white">

<div class="relative z-10 flex flex-col h-full min-h-screen">

<div class="flex items-center gap-4">
<a class="text-white/80 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-3xl">arrow_forward</span>
</a>
<div class="h-8 w-[1px] bg-white/10 mx-2"></div>
<div class="flex items-center gap-3">
<div class="size-8 rounded-full bg-primary/20 flex items-center justify-center text-primary border border-primary/30">

</div>
<h1 class="text-white text-xl lg:text-2xl font-bold font-serif tracking-wide">ديوان الصوفية</h1>

</div>

</div>

<div class="w-full max-w-[800px] flex flex-col gap-8">
<!-- Page Title Area -->
<div class="text-center space-y-2 mb-4">
<h2 class="text-white text-3xl md:text-4xl font-serif font-bold leading-tight">إضافة قصيدة جديدة</h2>
<p class="text-[#a1b5ae] text-base font-normal max-w-lg mx-auto">شاركنا نفحاتك الروحية وأضف جوهرة جديدة إلى عقد ديوان الصوفية</p>
</div>
<!-- Glass Form Card -->
<form class="glass-panel rounded-2xl p-6 md:p-10 shadow-glass flex flex-col gap-8 relative overflow-hidden">
<!-- Decor shine effect -->
<div class="absolute top-0 right-0 w-full h-[1px] bg-gradient-to-l from-transparent via-primary/50 to-transparent opacity-50"></div>
<!-- Row 1: Poem Title -->
<div class="flex flex-col gap-2">
<label class="text-white/90 text-sm font-bold flex items-center gap-2" for="poem-title">
<span class="material-symbols-outlined text-primary text-lg">edit_note</span>
                            عنوان القصيدة
                        </label>
<input class="w-full bg-[#121715] border border-[#3f504a] text-white placeholder:text-[#a1b5ae]/50 rounded-xl px-4 py-3.5 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all duration-300 hover:border-[#5a6e66]" id="poem-title" placeholder="مثل: البردة، نهج البردة..." type="text"/>
</div>
<!-- Row 2: Grid for Dropdowns -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Poet Name -->
<div class="flex flex-col gap-2">
<label class="text-white/90 text-sm font-bold flex items-center gap-2" for="poet-name">
<span class="material-symbols-outlined text-primary text-lg">person_book</span>

                            </label>
<div class="relative">
<select class="w-full appearance-none bg-[#121715] border border-[#3f504a] text-white rounded-xl px-4 py-3.5 pr-10 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none cursor-pointer transition-all duration-300 hover:border-[#5a6e66]" id="poet-name">
<option disabled="" selected="" value="">اختر الشاعر...</option>
<option value="ibn-arabi">محيي الدين بن عربي</option>
<option value="rumi">جلال الدين الرومي</option>
<option value="al-hallaj">الحلاج</option>
<option value="ibn-alfarid">ابن الفارض</option>
<option value="other">شاعر آخر...</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#a1b5ae] pointer-events-none">expand_more</span>
</div>
</div>
<!-- Maqam -->
<div class="flex flex-col gap-2">
<label class="text-white/90 text-sm font-bold flex items-center gap-2" for="maqam">
<span class="material-symbols-outlined text-primary text-lg">music_note</span>
                                المقام الموسيقي
                            </label>
<div class="relative">
<select class="w-full appearance-none bg-[#121715] border border-[#3f504a] text-white rounded-xl px-4 py-3.5 pr-10 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none cursor-pointer transition-all duration-300 hover:border-[#5a6e66]" id="maqam">
<option disabled="" selected="" value="">اختر المقام...</option>
<option value="rast">راست</option>
<option value="bayati">بياتي</option>
<option value="sika">سيكا</option>
<option value="nahawand">نهاوند</option>
<option value="hijaz">حجاز</option>
</select>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#a1b5ae] pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Row 3: Category -->
<div class="flex flex-col gap-2">
<label class="text-white/90 text-sm font-bold flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-lg">category</span>
                            التصنيف
                        </label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer group">
<input class="peer sr-only" name="category" type="radio" value="ilahiyat"/>
<div class="px-5 py-2.5 rounded-lg border border-[#3f504a] bg-[#121715] text-[#a1b5ae] peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all duration-200 group-hover:bg-[#1d2522]">
                                    إلهيات
                                </div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" name="category" type="radio" value="nabawiyat"/>
<div class="px-5 py-2.5 rounded-lg border border-[#3f504a] bg-[#121715] text-[#a1b5ae] peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all duration-200 group-hover:bg-[#1d2522]">
                                    نبويات
                                </div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" name="category" type="radio" value="hadra"/>
<div class="px-5 py-2.5 rounded-lg border border-[#3f504a] bg-[#121715] text-[#a1b5ae] peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all duration-200 group-hover:bg-[#1d2522]">
                                    حضرة
                                </div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" name="category" type="radio" value="mufrad"/>
<div class="px-5 py-2.5 rounded-lg border border-[#3f504a] bg-[#121715] text-[#a1b5ae] peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all duration-200 group-hover:bg-[#1d2522]">
                                    مفرد
                                </div>
</label>
</div>
</div>
<!-- Row 4: Poem Text Area -->
<div class="flex flex-col gap-2 flex-1">
<div class="flex justify-between items-end">
<label class="text-white/90 text-sm font-bold flex items-center gap-2" for="poem-text">
<span class="material-symbols-outlined text-primary text-lg">format_quote</span>

                            </label>
<span class="text-xs text-[#a1b5ae] bg-white/5 px-2 py-1 rounded">تنسيق تلقائي</span>
</div>
<div class="relative group/textarea">
<textarea class="w-full bg-[#121715] border border-[#3f504a] text-white placeholder:text-[#a1b5ae]/30 rounded-xl px-6 py-6 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none font-serif text-lg leading-[2.5] text-center resize-y transition-all duration-300 hover:border-[#5a6e66]" id="poem-text" placeholder="أمن تذكر جيران بذي سلم
مزجت دمعاً جرى من مقلة بدم

أم هبت الريح من تلقاء كاظمة
وأومض البرق في الظلماء من إضم" rows="12"></textarea>
<!-- Decorative corner accents for poetry feel -->
<div class="absolute top-2 right-2 text-[#3f504a] group-focus-within/textarea:text-primary/50 transition-colors pointer-events-none">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20"><path d="M5 5h6v2H7v4H5V5z"></path></svg>
</div>
<div class="absolute top-2 left-2 text-[#3f504a] group-focus-within/textarea:text-primary/50 transition-colors pointer-events-none transform -scale-x-100">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20"><path d="M5 5h6v2H7v4H5V5z"></path></svg>
</div>
<div class="absolute bottom-2 right-2 text-[#3f504a] group-focus-within/textarea:text-primary/50 transition-colors pointer-events-none transform -scale-y-100">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20"><path d="M5 5h6v2H7v4H5V5z"></path></svg>
</div>
<div class="absolute bottom-2 left-2 text-[#3f504a] group-focus-within/textarea:text-primary/50 transition-colors pointer-events-none transform -scale-x-100 -scale-y-100">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20"><path d="M5 5h6v2H7v4H5V5z"></path></svg>
</div>
</div>
<p class="text-xs text-[#a1b5ae] mr-1">يرجى التأكد من صحة التشكيل لضمان دقة القراءة.</p>
</div>

<div class="flex flex-col-reverse md:flex-row items-center gap-4 mt-4 pt-6 border-t border-white/5">
<button class="w-full md:w-auto px-6 py-3 rounded-xl text-[#a1b5ae] text-sm font-bold hover:text-white hover:bg-white/5 transition-colors" type="button">

                        </button>
<div class="flex-1"></div>
<button class="w-full md:w-auto px-6 py-3 rounded-xl bg-white/5 text-white text-sm font-bold border border-white/10 hover:bg-white/10 transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-lg">save</span>

                        </button>
<button class="w-full md:w-auto min-w-[160px] bg-gradient-to-r from-primary-dark to-primary text-white font-bold text-sm px-8 py-3 rounded-xl hover:shadow-glow hover:to-primary-light transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-lg">publish</span>
                            حفظ ونشر
                        </button>
</div>
</form>
<!-- Footer hint -->
<div class="text-center pb-8">
<p class="text-xs text-[#a1b5ae]/60">جميع الحقوق محفوظة © ديوان الصوفية 2024</p>
</div>
</div>
</main>
